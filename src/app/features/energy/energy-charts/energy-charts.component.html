<div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-6 w-full h-96 lg:h-[28rem] flex flex-col">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h3 class="text-lg font-semibold text-gray-800">Tendencia de Consumo Energético</h3>
            <p class="text-sm text-gray-500">Monitoreo de uso diario (últimos 7 días)</p>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-sm text-gray-600">En tiempo real</span>
        </div>
    </div>

    <div class="flex-1 relative">
        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" type="line">
        </canvas>
    </div>
</div>

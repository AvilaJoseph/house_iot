<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
  @for (energy of energyStats(); track $index) {
    <div class="bg-white p-6 rounded-2xl flex flex-col gap-3 border border-gray-100">
      <div class="flex items-center justify-between">
        <span class="text-base font-medium text-gray-500">{{ energy.title }}</span>

        <div
          class="w-10 h-10 rounded-xl flex items-center justify-center"
          [ngClass]="{
            'bg-yellow-100 text-yellow-600': energy.title === 'Consumo actual',
            'bg-blue-100 text-blue-600': energy.title === 'Consumo diario',
            'bg-green-100 text-green-600': energy.title === 'Eficiencia energética',
            'bg-emerald-100 text-emerald-600': energy.title === 'Costo estimado'
          }"
        >
          <lucide-icon [img]="energy.icon" class="w-5 h-5"></lucide-icon>
        </div>
      </div>

      <span class="text-3xl font-semibold text-gray-800 leading-tight">
        {{ energy.consume }}
        <span class="text-lg text-gray-500">{{ energy.typeconsume }}</span>
      </span>
      <span class="text-sm text-gray-400">{{ energy.date }}</span>
    </div>
  }
</div>

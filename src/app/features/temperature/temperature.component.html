<div class="w-full h-full flex flex-col">
  <h2 class="font-bold text-2xl lg:text-3xl text-gray-800 mb-4">Clima Hoy</h2>
  <div class="flex items-center justify-between bg-white rounded-2xl p-6">
    <div class="flex items-center gap-4">
      <div class="w-20 h-20 bg-gradient-to-br from-blue-400 to-sky-600 rounded-full flex items-center justify-center">
        <lucide-icon [img]="iconoActual()" class="w-10 h-10 text-white"></lucide-icon>
      </div>
      <div>
        <h3 class="text-2xl font-semibold text-gray-800">{{ climaActual() }}</h3>
        <p class="text-gray-500 text-md">Temperatura actual</p>
      </div>
    </div>

    <div class="text-right">
      <p class="text-5xl font-bold text-gray-900">{{ temperaturaActual() }}°C</p>
      <p class="text-gray-500 text-sm mt-1">Sensación térmica: {{ temperaturaActual() + 1 }}°C</p>
    </div>
  </div>

  <div class="mt-6 flex-1">
    <temperature-temperature-stats></temperature-temperature-stats>
    <temperature-temperature-trend></temperature-temperature-trend>
  </div>
</div>

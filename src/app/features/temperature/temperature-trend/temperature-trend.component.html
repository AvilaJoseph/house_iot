<div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-all">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
      <lucide-icon [img]="LineChart" class="w-5 h-5 text-blue-500"></lucide-icon>
      Evolución de las últimas horas
    </h2>
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full text-sm text-left border-collapse">
      <thead>
        <tr class="border-b text-gray-500 font-medium">
          <th class="py-2 px-3">Hora</th>
          <th class="py-2 px-3">Temperatura</th>
          <th class="py-2 px-3">Clima</th>
          <th class="py-2 px-3">Descripción</th>
        </tr>
      </thead>
      <tbody>
        @for (hour of hours; track $index) {
          <tr class="border-b last:border-none hover:bg-gray-50 transition">
            <td class="py-2 px-3 font-medium text-gray-700">{{ hour.time }}</td>
            <td class="py-2 px-3 text-gray-800 text-lg">
              {{ hour.temp }}<span class="text-sm text-gray-500">°C</span>
            </td>
            <td class="py-2 px-3">
              <lucide-icon [img]="hour.icon" class="w-5 h-5 text-blue-500"></lucide-icon>
            </td>
            <td class="py-2 px-3 text-gray-600">{{ hour.desc }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="mt-4 text-sm text-gray-600 border-t pt-3 flex items-center gap-2">
    <lucide-icon [img]="TrendingUp" class="w-4 h-4 text-green-600"></lucide-icon>
    {{ tendencia }}
  </div>
</div>

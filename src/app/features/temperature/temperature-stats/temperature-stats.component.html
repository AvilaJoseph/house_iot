<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
  @for (item of stats; track $index) {
    <div
      class="bg-gray-50 p-6 rounded-2xl flex items-center gap-4"
    >
      <div [class]="item.bg + ' ' + item.color + ' p-3 rounded-full flex items-center justify-center'">
        <lucide-icon [img]="item.icon" class="w-6 h-6"></lucide-icon>
      </div>
      <div>
        <h2 class="text-sm font-medium text-gray-500">{{ item.label }}</h2>
        <p class="text-3xl font-semibold text-gray-800 mt-1">
          {{ item.value }}
          <span class="text-lg text-gray-500 font-normal">{{ item.unit }}</span>
        </p>
      </div>
    </div>
  }
</div>

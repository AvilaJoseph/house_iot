<div class="bg-white rounded-2xl p-6 transition-all border border-gray-100 mt-6">
  <div class="overflow-x-auto">
    <!-- Encabezado -->
    <div class="flex items-center gap-2 mb-4">
      <lucide-icon [img]="Siren" class="w-6 h-6 text-red-500"></lucide-icon>
      <span class="text-lg font-semibold text-gray-800">Lista de alertas</span>
    </div>

    <!-- Tabla -->
    <table class="min-w-full text-sm text-left border-collapse">
      <thead>
        <tr class="border-b text-gray-500 font-medium">
          <th class="py-3 px-4 text-left">Alerta</th>
          <th class="py-3 px-4 text-center">Hora</th>
          <th class="py-3 px-4 text-center">Nivel</th>
          <th class="py-3 px-4 text-center">Estado</th>
          <th class="py-3 px-4 text-right">Acciones</th>
        </tr>
      </thead>

      <tbody>
        @for (alert of alerts; track $index) {
          <tr class="border-b last:border-none hover:bg-gray-50 transition">
            <!-- Columna: Alerta -->
            <td class="py-3 px-4 font-medium text-gray-800">
              <div class="flex items-center gap-3">
                <lucide-icon [img]="alert.icon" class="w-5 h-5 text-red-500"></lucide-icon>
                <span>{{ alert.title }}</span>
              </div>
            </td>

            <!-- Columna: Hora -->
            <td class="py-3 px-4 text-gray-700 text-center align-middle">
              {{ alert.time }}
            </td>

            <!-- Columna: Nivel -->
            <td class="py-3 px-4 text-center align-middle">
              <span
                class="inline-block px-3 py-1 rounded-full text-xs font-medium"
                [ngClass]="{
                  'bg-red-100 text-red-700': alert.level === 'Alta',
                  'bg-yellow-100 text-yellow-700': alert.level === 'Media',
                  'bg-blue-100 text-blue-700': alert.level === 'Baja'
                }"
              >
                {{ alert.level }}
              </span>
            </td>

            <!-- Columna: Estado -->
            <td class="py-3 px-4 text-center align-middle">
              <span
                class="inline-block px-3 py-1 rounded-full text-xs font-medium"
                [ngClass]="{
                  'bg-red-50 text-red-700': alert.status === 'Pendiente',
                  'bg-green-50 text-green-700': alert.status === 'Resuelta'
                }"
              >
                {{ alert.status }}
              </span>
            </td>

            <!-- Columna: Acciones -->
            <td class="py-3 px-4 text-right align-middle">
              <div class="inline-flex items-center gap-2">
                <button
                  type="button"
                  title="Ver alerta"
                  (click)="onView(alert)"
                  class="p-2 rounded-md hover:bg-gray-100 transition"
                  aria-label="Ver alerta {{ alert.title }}"
                >
                  <lucide-icon [img]="Camera" class="w-4 h-4 text-blue-600"></lucide-icon>
                </button>

                <button
                  type="button"
                  title="Resolver"
                  (click)="onResolve(alert)"
                  class="p-2 rounded-md hover:bg-gray-100 transition"
                  aria-label="Resolver alerta {{ alert.title }}"
                >
                  <lucide-icon [img]="CheckCircle2" class="w-4 h-4 text-green-600"></lucide-icon>
                </button>

                <button
                  type="button"
                  title="Eliminar"
                  (click)="onDelete(alert)"
                  class="p-2 rounded-md hover:bg-gray-100 transition"
                  aria-label="Eliminar alerta {{ alert.title }}"
                >
                  <lucide-icon [img]="Trash2" class="w-4 h-4 text-red-600"></lucide-icon>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

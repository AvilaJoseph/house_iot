<div class="bg-white rounded-2xl p-6 transition-all border border-gray-100 shadow-sm mt-6">
  <!-- Encabezado -->
  <div class="flex items-center gap-2 mb-4">
    <lucide-icon [img]="Monitor" class="w-6 h-6 text-blue-500"></lucide-icon>
    <span class="text-lg font-semibold text-gray-800">Lista de Dispositivos</span>
  </div>

  <!-- Tabla -->
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm text-left border-collapse">
      <thead>
        <tr class="border-b text-gray-500 font-medium">
          <th class="py-3 px-3 w-12 text-center align-middle">
            <input
              type="checkbox"
              class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
            />
          </th>
          <th class="py-3 px-3 align-middle">Nombre</th>
          <th class="py-3 px-3 align-middle">Tipo</th>
          <th class="py-3 px-3 align-middle">Serial</th>
          <th class="py-3 px-3 align-middle">UDID</th>
          <th class="py-3 px-3 align-middle">Estado</th>
          <th class="py-3 px-3 align-middle">Ubicación</th>
          <th class="py-3 px-3 text-right align-middle">Acciones</th>
        </tr>
      </thead>

      <tbody>
        @for (device of DevicesList; track device.udid) {
          <tr class="border-b last:border-none hover:bg-gray-50 transition cursor-pointer h-[52px] align-middle">
            <td class="py-3 px-3 text-center align-middle">
              <input
                type="checkbox"
                class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
              />
            </td>

            <td class="py-3 px-3 font-medium text-gray-800 align-middle">
              <div class="flex items-center gap-2">
                <lucide-icon [img]="Monitor" class="w-4 h-4 text-blue-500"></lucide-icon>
                <span>{{ device.name }}</span>
              </div>
            </td>

            <td class="py-3 px-3 text-gray-700 align-middle">{{ device.type }}</td>
            <td class="py-3 px-3 text-gray-600 align-middle">{{ device.serialNumber }}</td>
            <td class="py-3 px-3 text-gray-700 align-middle">{{ device.udid }}</td>

            <td class="py-3 px-3 align-middle">
              <span
                class="px-3 py-1.5 rounded-full text-xs font-medium inline-flex items-center justify-center"
                [ngClass]="{
                  'bg-green-100 text-green-700': device.status === 'Active',
                  'bg-red-100 text-red-700': device.status === 'Inactive'
                }"
              >
                {{ device.status === 'Active' ? 'Activo' : 'Inactivo' }}
              </span>
            </td>

            <td class="py-3 px-3 font-medium text-gray-800 align-middle">
              {{ device.location }}
            </td>

            <td class="py-3 px-3 text-right align-middle">
              <div class="inline-flex items-center justify-end gap-2">
                <!-- Botón de ver cámara -->
                <button
                  class="p-2 rounded-md hover:bg-gray-100 transition"
                  title="Ver cámara"
                  (click)="onViewDevice(device); $event.stopPropagation()"
                >
                  <lucide-icon [img]="Camera" class="w-4 h-4 text-blue-600"></lucide-icon>
                </button>

                <!-- Botón de más opciones -->
                <button
                  class="p-2 rounded-md hover:bg-gray-100 text-gray-500 transition"
                  title="Más opciones"
                >
                  <lucide-icon [img]="MoreVertical" class="w-4 h-4"></lucide-icon>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

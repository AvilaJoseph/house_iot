<div class="w-full overflow-x-auto mt-6 rounded-lg border border-gray-200">
    <table class="w-full border-collapse">
        <thead class="bg-white">
            <tr class="border-b border-gray-200">
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                    <input type="checkbox" class="rounded">
                </th>
                <th class="text-left py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
                <th class="text-left py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Type</th>
                <th class="text-left py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Serial</th>
                <th class="text-left py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">UDID</th>
                <th class="text-left py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Device
                    Status</th>
                <th class="text-left py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Location
                </th>
                <th class="text-left py-4 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions
                </th>
            </tr>
        </thead>
        <tbody class="bg-white">
            @for (device of DevicesList; track device.udid) {
            <tr class="border-b border-gray-100 hover:bg-gray-50">
                <td class="py-4 px-4">
                    <input type="checkbox" class="rounded">
                </td>
                <td class="py-4 px-4">
                    <span class="text-gray-600">{{device.name}}</span>
                </td>
                <td class="py-4 px-4">
                    <span class="text-gray-600">{{device.type}}</span>
                </td>
                <td class="py-4 px-4">
                    <div class="flex flex-col">
                        <span class="text-sm text-gray-500">{{device.serialNumber}}</span>
                    </div>
                </td>
                <td class="py-4 px-4">
                    <span class="text-gray-600">{{device.udid}}</span>
                </td>
                <td class="py-4 px-4">
                    @if (device.status === 'Active') {
                    <div class="flex items-center gap-2">
                        <span class="flex items-center gap-1.5 text-green-600 font-medium">
                            <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                            Active
                        </span>
                    </div>
                    } @else {
                    <div class="flex items-center gap-2">
                        <span class="flex items-center gap-1.5 text-red-600 font-medium">
                            <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                            Inactive
                        </span>
                    </div>
                    }
                </td>
                <td class="py-4 px-4">
                    <div class="flex flex-col">
                        <span class="font-medium text-gray-900">{{device.location}}</span>
                    </div>
                </td>
                <td class="py-4 px-4">
                    <div class="flex items-center gap-2">
                        <button class="p-2 hover:bg-gray-100 rounded transition-colors">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                            </svg>
                        </button>
                    </div>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>

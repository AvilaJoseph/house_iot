<div class="w-full overflow-x-auto mt-6 rounded-lg">
    <table class="w-full border-collapse">
        <thead class="bg-white">
            <tr class="border-b border-gray-200">
                <th class="text-left py-3 px-4 w-12">
                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                </th>
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Name</th>
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Type</th>
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Serial</th>
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">UDID</th>
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Device Status</th>
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Location</th>
                <th class="text-left py-3 px-4 text-xs font-semibold text-gray-600 uppercase tracking-wider w-20">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-100">
            @for (device of DevicesList; track device.udid) {
            <tr class="hover:bg-white transition-colors">
                <td class="py-3 px-4">
                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                </td>
                <td class="py-3 px-4">
                    <span class="text-sm font-medium text-gray-900">{{device.name}}</span>
                </td>
                <td class="py-3 px-4">
                    <span class="text-sm text-gray-700">{{device.type}}</span>
                </td>
                <td class="py-3 px-4">
                    <span class="text-sm text-gray-600">{{device.serialNumber}}</span>
                </td>
                <td class="py-3 px-4">
                    <span class="text-sm text-gray-700">{{device.udid}}</span>
                </td>
                <td class="py-3 px-4">
                    @if (device.status === 'Active') {
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-green-50 text-green-700 text-xs font-medium rounded-full">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                        Active
                    </span>
                    } @else {
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-red-50 text-red-700 text-xs font-medium rounded-full">
                        <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                        Inactive
                    </span>
                    }
                </td>
                <td class="py-3 px-4">
                    <span class="text-sm font-medium text-gray-900">{{device.location}}</span>
                </td>
                <td class="py-3 px-4">
                    <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                        </svg>
                    </button>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>

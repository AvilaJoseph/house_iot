<div class="space-y-6 mt-4">

  <!-- PLANO SVG -->
  <div class="relative bg-gray-50 rounded-2xl p-4 flex justify-center items-center overflow-hidden">
    <!-- Indicador global -->
    <div class="absolute top-4 left-4 bg-white backdrop-blur-sm rounded-xl px-3 py-2 flex items-center gap-3 shadow-lg">
      <div class="flex flex-col">
        <span class="text-xs text-gray-500">Luces</span>
        <span class="text-sm font-semibold text-gray-800">{{ getLightsOn() }} / {{ getTotalLights() }}</span>
      </div>
      <div class="h-2.5 w-2.5 rounded-full"
           [ngClass]="{'bg-yellow-400': getLightsOn()>0, 'bg-gray-300': getLightsOn()===0 }"
           title="Luces encendidas"></div>
    </div>

    <!-- Imagen SVG -->
    <div class="w-full max-w-4xl flex justify-center">
      <img src="plano.svg" alt="Plano de la casa"
           class="w-full h-auto max-h-86 object-contain rounded-md" />
    </div>
  </div>

  <!-- LISTA DE HABITACIONES -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let room of rooms" class="bg-gray-50 p-6 rounded-2xl flex flex-col shadow-sm">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-base font-medium text-gray-600">{{ room.name }}</h2>

        <!-- Indicador por habitación -->
        <div class="text-sm text-gray-500">
          {{ getRoomOnCount(room) }} / {{ room.lights.length }}
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <div *ngFor="let light of room.lights" class="flex items-center justify-between">
          <span class="text-gray-500 text-sm">{{ light.label }}</span>
          <button
            (click)="toggleLight(room.id, light.id)"
            [class.bg-yellow-400]="light.on"
            [class.bg-gray-300]="!light.on"
            class="w-6 h-6 rounded-full transition-colors border border-gray-200 flex items-center justify-center"
            aria-pressed="{{ light.on }}"
            [attr.aria-label]="(light.on ? 'Apagar' : 'Encender') + ' ' + light.label + ' de ' + room.name">
            <!-- Icono de luz encendida -->
            <svg *ngIf="light.on" xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364-7.364l-1.414 1.414M7.05 16.95l-1.414 1.414M16.95 16.95l1.414 1.414M7.05 7.05 5.636 5.636" />
            </svg>
          </button>
        </div>

        <!-- Aire acondicionado -->
        <div *ngIf="room.ac !== undefined" class="flex items-center justify-between mt-2">
          <span class="text-gray-500 text-sm">Aire acondicionado</span>
          <button
            (click)="toggleAC(room.id)"
            [class.bg-blue-400]="room.ac"
            [class.bg-gray-300]="!room.ac"
            class="w-6 h-6 rounded-full transition-colors border border-gray-200 flex items-center justify-center"
            aria-pressed="{{ room.ac }}"
            [attr.aria-label]="(room.ac ? 'Apagar' : 'Encender') + ' aire de ' + room.name">
            <!-- Icono de nieve (activo/inactivo) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3"
                 [ngClass]="{'text-white': room.ac, 'text-gray-500': !room.ac}"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 2v20m0-10l8.66-5M12 12l-8.66-5M12 12l8.66 5M12 12l-8.66 5M12 22v-2M12 2v2" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="space-y-6 mt-4">

  <!-- PLANO SVG INTERACTIVO -->
  <div class="relative bg-white rounded-2xl p-4 flex justify-center items-center overflow-hidden">

    <!-- Indicadores globales -->
    <div
      class="absolute top-4 left-4 flex items-center gap-3 bg-white backdrop-blur-sm rounded-xl px-4 py-2 shadow-lg z-10">

      <!-- Luces -->
      <div class="flex items-center gap-2">
        <div class="flex flex-col">
          <span class="text-xs text-gray-500">Luces</span>
          <span class="text-sm font-semibold text-gray-800">
            {{ getLightsOn() }} / {{ getTotalLights() }}
          </span>
        </div>
        <div
          class="h-2.5 w-2.5 rounded-full"
          [ngClass]="{
            'bg-yellow-400': getLightsOn() > 0,
            'bg-gray-300': getLightsOn() === 0
          }"
          title="Luces encendidas"
        ></div>
      </div>

      <div class="w-px h-6 bg-gray-200"></div>

      <!-- Aire -->
      <div class="flex items-center gap-2">
        <div class="flex flex-col">
          <span class="text-xs text-gray-500">Aire</span>
          <span class="text-sm font-semibold text-gray-800">
            {{ getACOn() }} / {{ getTotalAC() }}
          </span>
        </div>
        <div
          class="h-2.5 w-2.5 rounded-full"
          [ngClass]="{
            'bg-blue-400': getACOn() > 0,
            'bg-gray-300': getACOn() === 0
          }"
          title="Aires encendidos"
        ></div>
      </div>
    </div>

    <!-- SVG PLANO -->
    <div class="w-full max-w-4xl flex justify-center">
      <svg viewBox="0 0 905 560" class="w-full h-auto max-h-[600px]">
        <image href="plano.svg" width="905" height="560" />

        @for (room of rooms; track $index) {

          @if (room.ac !== undefined && room.acX !== undefined && room.acY !== undefined) {
            <!-- AC -->
            @if (room.ac) {
              <circle [attr.cx]="room.acX" [attr.cy]="room.acY" r="18" fill="#60a5fa" opacity="0.4" class="animate-pulse" />
            }

            <circle
              [attr.cx]="room.acX"
              [attr.cy]="room.acY"
              r="10"
              [attr.fill]="room.ac ? '#60a5fa' : '#6b7280'"
              stroke="white"
              stroke-width="2"
              class="cursor-pointer transition-all hover:r-12"
              [class.shadow-lg]="room.ac"
              (click)="toggleAC(room.id)"
              (mouseenter)="hoveredAC = room.id"
              (mouseleave)="hoveredAC = null"
            >
              <title>{{ room.name }} - Aire Acondicionado</title>
            </circle>

            <g [attr.transform]="'translate(' + (room.acX - 6) + ',' + (room.acY - 6) + ')'">
              <path
                d="M6 2 L6 10 M2 6 L10 6 M3.5 3.5 L8.5 8.5 M8.5 3.5 L3.5 8.5"
                [attr.stroke]="room.ac ? 'white' : '#d1d5db'"
                stroke-width="1.2"
                stroke-linecap="round"
              />
              <circle
                cx="6"
                cy="6"
                r="2"
                fill="none"
                [attr.stroke]="room.ac ? 'white' : '#d1d5db'"
                stroke-width="1"
              />
            </g>

            @if (hoveredAC === room.id) {
              <g>
                <rect
                  [attr.x]="room.acX - 50"
                  [attr.y]="room.acY - 35"
                  width="100"
                  height="20"
                  rx="4"
                  fill="rgba(0,0,0,0.8)"
                />
                <text
                  [attr.x]="room.acX"
                  [attr.y]="room.acY - 22"
                  text-anchor="middle"
                  fill="white"
                  font-size="10"
                  font-weight="600"
                >
                  {{ room.name }} - AC
                </text>
              </g>
            }
          }

          <!-- Luces -->
          @for (light of room.lights; track $index) {
            @if (light.on) {
              <circle
                [attr.cx]="light.x"
                [attr.cy]="light.y"
                r="18"
                fill="#fbbf24"
                opacity="0.4"
                class="animate-pulse"
              />
            }

            <circle
              [attr.cx]="light.x"
              [attr.cy]="light.y"
              r="10"
              [attr.fill]="light.on ? '#fbbf24' : '#6b7280'"
              stroke="white"
              stroke-width="2"
              class="cursor-pointer transition-all hover:r-12"
              [class.shadow-lg]="light.on"
              (click)="toggleLightByCoords(room.id, light.id)"
              (mouseenter)="hoveredLight = room.id + '-' + light.id"
              (mouseleave)="hoveredLight = null"
            >
              <title>{{ room.name }} - {{ light.label }}</title>
            </circle>

            <g [attr.transform]="'translate(' + (light.x - 5) + ',' + (light.y - 5) + ')'">
              @if (light.on) {
                <path
                  d="M5 2 L5 0 M8.66 3.34 L10.08 1.92 M10 6 L12 6 M8.66 8.66 L10.08 10.08 M5 10 L5 12 M1.34 8.66 L-0.08 10.08 M0 6 L-2 6 M1.34 3.34 L-0.08 1.92"
                  stroke="white"
                  stroke-width="1"
                  stroke-linecap="round"
                />
              } @else {
                <circle cx="5" cy="6" r="3" fill="none" stroke="white" stroke-width="1.5" />
              }
            </g>

            @if (hoveredLight === room.id + '-' + light.id) {
              <g>
                <rect
                  [attr.x]="light.x - 40"
                  [attr.y]="light.y - 35"
                  width="80"
                  height="20"
                  rx="4"
                  fill="rgba(0,0,0,0.8)"
                />
                <text
                  [attr.x]="light.x"
                  [attr.y]="light.y - 22"
                  text-anchor="middle"
                  fill="white"
                  font-size="10"
                  font-weight="600"
                >
                  {{ room.name }} - {{ light.label }}
                </text>
              </g>
            }
          }
        }
      </svg>
    </div>
  </div>
</div>

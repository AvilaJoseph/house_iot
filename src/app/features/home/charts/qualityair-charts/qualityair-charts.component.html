<div class="flex flex-col items-center justify-center text-center py-8 select-none">
  <p class="text-6xl font-extrabold text-slate-800 tracking-tight">
    {{ airQualityValue }}<span class="text-4xl"> /500</span>
  </p>

  <p
    class="text-xl font-semibold mt-2 transition-colors duration-300"
    [ngClass]="progressColor"
  >
    {{ airQualityLabel }}
  </p>

  <p class="text-base text-slate-400 mt-1">
    Índice de Calidad del Aire (ICA)
  </p>

  <!-- 🔹 Descripción adicional -->
  <p class="text-sm text-slate-500 mt-4 max-w-xs leading-snug">
    {{ airQualityDescription }}
  </p>
</div>

<div class="flex flex-col items-center justify-center text-center py-8 select-none">
  <p class="text-6xl font-extrabold text-slate-800 tracking-tight">
    {{ airQualityValue }}<span class="text-5xl"> /500</span>
  </p>

  <p
    class="text-base font-semibold mt-2 transition-colors duration-300"
    [ngClass]="progressColor"
  >
    {{ airQualityLabel }}
  </p>

  <p class="text-xs text-slate-400 mt-1">
    Índice de calidad del aire (AQI)
  </p>
</div>

<div class="flex h-screen bg-[#f3f2f7] relative">
  <!-- Overlay para móviles - CIERRA AL HACER CLIC -->
  <div 
    *ngIf="sidebarOpen"
    (click)="closeSidebar()"
    class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden transition-opacity duration-300">
  </div>

  <!-- Sidebar - Con animación en móviles -->
  <aside 
    [class.translate-x-0]="sidebarOpen"
    class="fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
    <app-sidebar (menuItemClick)="closeSidebar()"></app-sidebar>
  </aside>

  <!-- Contenedor principal -->
  <div class="flex flex-col flex-1 w-full">
    <!-- Topbar -->
    <app-topbar 
      (toggleMenu)="toggleSidebar()"
      class="h-16 bg-white border-b border-gray-100">
    </app-topbar>

    <!-- Contenido -->
    <main class="flex-1 p-4 lg:p-6 overflow-y-auto pb-20 lg:pb-6 w-full">
      <h1 class="text-2xl font-semibold text-gray-800 mb-4">Dashboard IoT</h1>

      <home-stats></home-stats>
    </main>
  </div>
</div>

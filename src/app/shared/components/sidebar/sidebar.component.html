<div class="w-full h-full flex flex-col p-6 hidden lg:block">
  <!-- Logo/Header -->
  <div class="mb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
        <lucide-icon [img]="Home" class="w-6 h-6 text-white"></lucide-icon>
      </div>
      <h1 class="text-xl font-bold text-gray-800">SmartHome</h1>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1">
    <ul class="space-y-2">
      <li *ngFor="let item of menuItems" 
          (click)="setActive(item.id)"
          class="cursor-pointer transition-all duration-200 hover:bg-gray-50 rounded-xl">
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl"
             [class.bg-blue-50]="activeMenu === item.id"
             [class.text-blue-600]="activeMenu === item.id"
             [class.text-gray-600]="activeMenu !== item.id">
          <lucide-icon 
            [img]="item.icon" 
            class="w-5 h-5" 
            [class.text-blue-600]="activeMenu === item.id"
            [class.text-gray-500]="activeMenu !== item.id">
          </lucide-icon>
          <span class="font-medium">{{ item.label }}</span>
        </div>
      </li>
    </ul>
  </nav>

  <!-- Footer Info -->
  <div class="mt-auto pt-4 border-t border-gray-100">
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-start gap-2">
      <lucide-icon [img]="AlertCircle" class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5"></lucide-icon>
      <div>
        <p class="text-xs font-semibold text-amber-800">2 Alertas</p>
        <p class="text-xs text-amber-600 mt-0.5">Revisa tus dispositivos</p>
      </div>
    </div>
  </div>
</div>
